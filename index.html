<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c4a6e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Ruthra Financial Solutions</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        background: linear-gradient(180deg, #f5fbfc 0%, #eef6f9 100%);
        color: #0b1220;
      }
      .app-splash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: min(100%, 22rem);
        padding: 2.5rem 2rem;
        text-align: center;
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 44px -28px rgba(12, 74, 110, 0.28);
      }
      .app-splash-logo {
        display: block;
        width: auto;
        max-width: min(280px, 72vw);
        height: 5.5rem;
        object-fit: contain;
      }
      .app-splash-brand {
        margin: 1.5rem 0 0;
        font: 600 0.68rem/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #0f766e;
      }
      .app-splash-spinner {
        width: 2.25rem;
        height: 2.25rem;
        margin-top: 1.5rem;
        border: 3px solid #e2e8f0;
        border-top-color: #0d9488;
        border-radius: 9999px;
        animation: app-splash-spin 0.8s linear infinite;
      }
      .app-splash-text {
        margin: 1rem 0 0;
        font: 500 0.875rem/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
        color: #475569;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" class="app-splash" aria-live="polite" aria-busy="true">
      <div class="app-splash-card">
        <img
          class="app-splash-logo"
          src="/branding/ruthra-logo.png"
          alt="Ruthra Financial Solutions"
          width="220"
          height="88"
          decoding="async"
          fetchpriority="high"
        />
        <p class="app-splash-brand">Ruthra Financial Solutions</p>
        <div class="app-splash-spinner" aria-hidden="true"></div>
        <p class="app-splash-text">Loading application…</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
